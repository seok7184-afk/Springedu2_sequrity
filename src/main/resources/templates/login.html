<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <div class="box">
        <h1>로그인</h1>
        <p class="msg" th:if="${msg}" th:text="${msg}"></p>
        <p class="error" th:if="${param.param}">아이디 또는 비밀번호가 올바르지 않습니다</p>
        <p class="msg" th:if="${param.logout}">로그아웃 되었습니다</p>
        <form th:action="@{/login}" method="post">
            <label>아이디
                <input type="text" name="username" placeholder="admin" autofocus required>
            </label>
            <label>비밀번호
                <input type="password" name="password" placeholder="admin1234" required>
            </label>
            <button type="submit">로그인</button>
        </form>
        <hr>
        <div class="hint">
            <strong>초기계정</strong><br>
            관리자: admin / admin1234<br>
            일반 사용자: user / user1234
        </div>
        <p>
            <a th:href="@{/member/register}">회원가입</a> |
            <a th:href="@{/index.html}">홈</a> |
        </p>
    </div>
</body>
</html>
